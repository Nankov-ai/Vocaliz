<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Texto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🔊 Leitor de Texto</h1>
      <p class="subtitle">Cola o teu texto e ouve-o</p>
    </header>

    <main>
      <div class="text-area-wrapper">
        <div id="display" class="display-box" contenteditable="true" spellcheck="false"
          data-placeholder="Cola ou escreve o teu texto aqui..."></div>
        <button class="btn-clear" id="btnClear" title="Limpar texto">✕</button>
      </div>

      <div class="controls">
        <div class="controls-row">
          <button class="btn btn-play" id="btnPlay">▶ Ouvir</button>
          <button class="btn btn-pause" id="btnPause" disabled>⏸ Pausa</button>
          <button class="btn btn-stop" id="btnStop" disabled>⏹ Parar</button>
        </div>

        <div class="settings">
          <div class="setting-group">
            <label for="voiceSelect">Voz</label>
            <select id="voiceSelect"></select>
          </div>
          <div class="setting-group">
            <label for="rateRange">Velocidade <span id="rateValue">1x</span></label>
            <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1" />
          </div>
          <div class="setting-group">
            <label for="pitchRange">Tom <span id="pitchValue">1</span></label>
            <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1" />
          </div>
        </div>
      </div>

      <div class="progress-bar-wrapper" id="progressWrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="status" id="status">Pronto</div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
