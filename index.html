<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocaliz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;">
        <img src="nodeflow_icon.svg" alt="Nodeflow" style="height:24px;width:24px;" />
        <h1 style="margin:0;">🔊 Vocaliz</h1>
      </div>
      <p class="subtitle">Cola o teu texto, carrega um ficheiro e ouve-o</p>
    </header>

    <main>
      <!-- Upload Zone -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput"
          accept=".txt,.md,.csv,.html,.htm,.srt,.vtt,.pdf,.docx,.xlsx,.xls"
          hidden />
        <div class="upload-inner" id="uploadInner">
          <span class="upload-icon">📎</span>
          <span class="upload-text">
            Arrasta um ficheiro ou
            <button class="btn-link" id="btnBrowse">escolhe aqui</button>
          </span>
          <span class="upload-formats">txt · md · csv · html · srt · pdf · docx · xlsx</span>
        </div>
        <div class="file-info" id="fileInfo" hidden>
          <span class="file-icon">📄</span>
          <span id="fileName"></span>
          <button class="btn-remove-file" id="btnRemoveFile" title="Remover ficheiro">✕</button>
        </div>
      </div>

      <!-- Table detection badge -->
      <div class="table-badge" id="tableBadge" hidden>
        📊 Tabela detetada — leitura adaptada com cabeçalhos
      </div>

      <!-- Text area -->
      <div class="text-area-wrapper">
        <div id="display" class="display-box" contenteditable="true" spellcheck="false"
          data-placeholder="Cola ou escreve o teu texto aqui..."></div>
        <button class="btn-clear" id="btnClear" title="Limpar">✕</button>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="controls-row">
          <button class="btn btn-play" id="btnPlay">▶ Ouvir</button>
          <button class="btn btn-pause" id="btnPause" disabled>⏸ Pausa</button>
          <button class="btn btn-stop" id="btnStop" disabled>⏹ Parar</button>
        </div>
        <div class="settings">
          <div class="setting-group">
            <label for="voiceSelect">Voz</label>
            <select id="voiceSelect"></select>
          </div>
          <div class="setting-group">
            <label for="rateRange">Velocidade <span id="rateValue">1.0x</span></label>
            <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1" />
          </div>
          <div class="setting-group">
            <label for="pitchRange">Tom <span id="pitchValue">1.0</span></label>
            <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1" />
          </div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-bar-wrapper" id="progressWrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="status" id="status">Pronto</div>
    </main>

    <!-- Footer Nodeflow -->
    <footer class="app-footer">
      <span>Uma app</span>
      <img src="nodeflow_icon.svg" alt="Nodeflow" class="footer-logo" />
      <span class="footer-brand">Nodeflow</span>
    </footer>
  </div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
